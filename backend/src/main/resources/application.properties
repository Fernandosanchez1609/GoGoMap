#Nombre del proyecto
spring.application.name=backend-GoGoMap

#Conexion a MySQL(Forzamos el uso de UTF-8)
spring.datasource.url=jdbc:mysql://localhost:3306/gogomap_db?serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=user
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#Configuracion de Hibernate/JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

#Seguridad JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES}



